name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          go-version-file: 'core/go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: |
          npm install -g @vscode/vsce
          cd extensions/vscode && npm install
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package VSIX Extensions
        run: |
          cd extensions/vscode
          VERSION=${GITHUB_REF_NAME#v}
          for os in darwin linux windows; do
            for arch in amd64 arm64; do
              case "$os-$arch" in
                darwin-amd64) TARGET="darwin-x64" ;;
                darwin-arm64) TARGET="darwin-arm64" ;;
                linux-amd64) TARGET="linux-x64" ;;
                linux-arm64) TARGET="linux-arm64" ;;
                windows-amd64) TARGET="win32-x64" ;;
                windows-arm64) TARGET="win32-arm64" ;;
              esac
              mkdir -p bin
              rm -rf bin/*
              if [ "$os" = "windows" ]; then
                 unzip -q -j "../../dist/curb_${VERSION}_${os}_${arch}.zip" -d bin/
              else
                 tar -xzf "../../dist/curb_${VERSION}_${os}_${arch}.tar.gz" -C bin/
              fi
              rm -f bin/install.sh bin/README.md bin/LICENSE bin/checksums.txt
              npx vsce package --target $TARGET --out "../../dist/curb-${VERSION}-$TARGET.vsix"
            done
          done

      - name: Upload VSIX to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.vsix
